name: Build Evolution Data

on:
  push:
    branches: [main]
    paths:
      - 'revo12000.txt'
      - 'build_evos.py'
      - 'name_aliases.json'
      - 'bst_overrides.json'
      - 'requirements.txt'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PYTHONUNBUFFERED: "1"
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run build script
        run: python build_evos.py
      
      - name: Check for failures
        run: |
          if [ -f failed_lookups.json ]; then
            echo "=== FAILED LOOKUPS ==="
            python -m json.tool failed_lookups.json | head -50
          fi
      
      - name: Commit results
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add random_bst_evolutions.json failed_lookups.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto: Update evolution data and failed lookups"
          git push
