<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Roguemon BST/10 Evo Calculator</title>
  <meta name="description" content="Calculate evolution outcomes for Roguemon BST/10 mode. See probabilities, types, and BST for every possible evolution path.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    :root {
      --bg: #020617;
      --panel: #0a0f1e;
      --card: #0f172a;
      --card-hover: #1a2540;
      --accent: #38bdf8;
      --accent-2: #22c55e;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --border: #1e293b;
      --glow: rgba(56, 189, 248, 0.08);
    }

    * {
      box-sizing: border-box;
      font-family: Inter, system-ui, sans-serif;
      margin: 0;
    }

    body {
      padding: 2rem 2.5rem;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* === HEADER === */
    .header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .header h1 {
      font-size: 2.2rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.02em;
    }

    .credit {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 0.4rem;
      letter-spacing: 0.03em;
    }

    .credit a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      transition: opacity 0.2s;
    }

    .credit a:hover {
      opacity: 0.8;
      text-decoration: underline;
    }

    /* === LAYOUT === */
    .app {
      display: grid;
      grid-template-columns: 600px 1fr;
      gap: 2rem;
      max-width: 1700px;
      margin: auto;
      align-items: start;
    }

    .stats-panel {
      position: sticky;
      top: 1rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .panel {
      background: var(--panel);
      border-radius: 16px;
      padding: 1.5rem;
      border: 1px solid var(--border);
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
    }

    /* === CONTROLS === */
    .controls {
      display: grid;
      gap: 1rem;
      margin-bottom: 1.25rem;
    }

    label {
      font-size: 0.8rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 500;
      margin-bottom: 0.3rem;
      display: block;
    }

    input {
      width: 100%;
      background: var(--card);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.65rem 0.85rem;
      font-size: 1rem;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--glow);
    }

    /* === SUGGESTIONS === */
    .suggestions {
      position: relative;
    }

    .suggestion-box {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      max-height: 260px;
      overflow-y: auto;
      z-index: 10;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.5);
    }

    .suggestion {
      padding: 0.55rem 0.85rem;
      cursor: pointer;
      font-size: 0.95rem;
      transition: background 0.15s;
    }

    .suggestion:hover {
      background: var(--card-hover);
    }

    /* === STARTER INFO CARD === */
    .starter-info {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.25rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 1.25rem;
    }

    .starter-info img {
      width: 72px;
      height: 72px;
      image-rendering: pixelated;
      filter: drop-shadow(0 0 6px rgba(56, 189, 248, 0.3));
    }

    .starter-details {
      flex: 1;
    }

    .starter-name {
      font-size: 1.3rem;
      font-weight: 700;
    }

    .starter-bst {
      font-size: 0.9rem;
      color: var(--muted);
      margin-top: 0.15rem;
    }

    .starter-bst span {
      color: var(--accent);
      font-weight: 600;
    }

    /* === LEVEL PILLS === */
    .levels {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-bottom: 1rem;
    }

    .level-pill {
      padding: 0.3rem 0.65rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--card);
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 500;
      transition: all 0.15s;
    }

    .level-pill:hover:not(.disabled) {
      border-color: var(--accent);
      background: var(--card-hover);
    }

    .level-pill.active {
      background: var(--accent);
      color: #020617;
      font-weight: 600;
      border-color: var(--accent);
    }

    .level-pill.disabled {
      opacity: 0.3;
      pointer-events: none;
    }

    /* === RESULT COUNT === */
    .result-meta {
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 0.75rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .result-meta strong {
      color: var(--text);
    }

    /* === EVO CARDS === */
    .results {
      display: grid;
      gap: 0.5rem;
    }

    .evo-card {
      background: var(--card);
      border: 1px solid var(--border);
      padding: 0.55rem 0.9rem;
      border-radius: 10px;
      display: grid;
      grid-template-columns: 48px 1.4fr auto 50px 1fr;
      align-items: center;
      gap: 0.8rem;
      transition: all 0.15s;
    }

    .evo-card:hover {
      background: var(--card-hover);
      border-color: #2d3a52;
      transform: translateY(-1px);
    }

    .evo-sprite {
      width: 44px;
      height: 44px;
      image-rendering: pixelated;
      opacity: 0.9;
    }

    .evo-name-col {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }

    .evo-name {
      font-weight: 600;
      font-size: 0.95rem;
    }

    .evo-types {
      display: flex;
      gap: 0.3rem;
      flex-wrap: wrap;
    }

    .evo-bst {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--muted);
      text-align: center;
      white-space: nowrap;
    }

    .evo-bst span {
      color: var(--accent-2);
    }

    .evo-level {
      text-align: center;
      color: var(--accent);
      font-weight: 700;
      font-size: 0.95rem;
    }

    .bar-col {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .bar {
      flex: 1;
      height: 8px;
      background: #1a2235;
      border-radius: 999px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      border-radius: 999px;
      transition: width 0.3s ease;
    }

    .percent {
      font-size: 0.78rem;
      color: var(--muted);
      min-width: 45px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    /* === TYPE BADGES === */
    .type-badge {
      display: inline-block;
      padding: 0.1rem 0.45rem;
      border-radius: 4px;
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #fff;
      text-shadow: 0 1px 2px rgba(0,0,0,0.3);
    }

    .type-normal    { background: #9fa19f; }
    .type-fire      { background: #e62829; }
    .type-water     { background: #2980ef; }
    .type-electric  { background: #fac000; color: #333; text-shadow: none; }
    .type-grass     { background: #3fa129; }
    .type-ice       { background: #3dcef3; color: #1a3a4a; text-shadow: none; }
    .type-fighting  { background: #ff8000; }
    .type-poison    { background: #9141cb; }
    .type-ground    { background: #915121; }
    .type-flying    { background: #81b9ef; color: #1a2a3a; text-shadow: none; }
    .type-psychic   { background: #ef4179; }
    .type-bug       { background: #91a119; }
    .type-rock      { background: #afa981; color: #333; text-shadow: none; }
    .type-ghost     { background: #704170; }
    .type-dragon    { background: #5060e1; }
    .type-dark      { background: #624d4e; }
    .type-steel     { background: #60a1b8; }
    .type-fairy     { background: #ef70ef; }

    /* === CHART STYLING === */
    .chart-container {
      background: var(--card);
      border-radius: 14px;
      padding: 1.25rem 1.5rem;
      border: 1px solid var(--border);
    }

    .chart-container h2 {
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* === EMPTY STATE === */
    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .empty-state .icon {
      font-size: 2.5rem;
      margin-bottom: 0.75rem;
      opacity: 0.5;
    }

    /* === SCROLLBAR === */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 999px; }
    ::-webkit-scrollbar-thumb:hover { background: #475569; }
  </style>
</head>

<body>

  <div class="header">
    <h1>Roguemon BST/10 Evo Calculator</h1>
    <div class="credit">Created by <a href="https://www.twitch.tv/bemidgegaming" target="_blank">BeMidgeGaming</a></div>
  </div>

  <div class="app">

    <!-- MAIN PANEL -->
    <div class="panel">
      <div class="controls">
        <div class="suggestions">
          <label for="pokemonInput">Pokémon</label>
          <input id="pokemonInput" placeholder="Start typing a Pokémon..." autocomplete="off">
          <div id="suggestions" class="suggestion-box" hidden></div>
        </div>

        <div>
          <label for="currentLevel">Current Level</label>
          <input id="currentLevel" type="number" min="1" max="100" value="1">
        </div>
      </div>

      <div id="starterInfo"></div>
      <div id="levels" class="levels"></div>
      <div id="resultMeta" class="result-meta" hidden></div>
      <div id="results" class="results">
        <div class="empty-state">
          <div class="icon">🔍</div>
          Select a Pokémon to see evolution outcomes.
        </div>
      </div>
    </div>

    <!-- SIDE PANEL -->
    <div class="stats-panel">
      <div class="chart-container">
        <h2>Evolution Level Distribution</h2>
        <canvas id="evoChart"></canvas>
      </div>

      <div class="chart-container">
        <h2>Type Combination Chances</h2>
        <canvas id="typeChart"></canvas>
      </div>
    </div>

  </div>

  <script src="app.js"></script>
</body>

</html>
